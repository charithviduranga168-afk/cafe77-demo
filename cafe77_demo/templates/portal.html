<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Kitchen Request — {{ outlet.name }}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;}
.header{background:#1D9E75;padding:18px 20px 16px;}
.header-sub{font-size:10px;color:#9FE1CB;font-weight:600;letter-spacing:0.05em;}
.header-title{font-size:19px;color:#fff;font-weight:600;margin-top:2px;}
.header-outlet{font-size:12px;color:#9FE1CB;margin-top:3px;}
.body{padding:16px;max-width:560px;margin:0 auto;}
.section-label{font-size:10px;font-weight:600;color:#888780;letter-spacing:0.05em;margin:18px 0 10px;}
.section-label:first-child{margin-top:0;}
.item-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:10px;border:0.5px solid #d3d1c7;padding:11px 14px;margin-bottom:8px;}
.item-name{font-size:14px;font-weight:500;color:#1a1a18;}
.item-unit{font-size:11px;color:#888780;margin-top:2px;}
.stepper{display:flex;align-items:center;gap:12px;}
.step-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #d3d1c7;background:#f5f4f0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1a1a18;-webkit-tap-highlight-color:transparent;}
.step-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff;}
.qty-val{font-size:16px;font-weight:600;min-width:22px;text-align:center;color:#888780;}
.qty-val.has{color:#0F6E56;}
.search-input{width:100%;padding:11px 14px;border:0.5px solid #d3d1c7;border-radius:10px;font-size:14px;background:#fff;color:#1a1a18;outline:none;}
.search-input:focus{border-color:#1D9E75;}
.search-result{background:#fff;border-radius:10px;border:0.5px solid #d3d1c7;padding:12px 14px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.search-result:active{background:#f5f4f0;}
.search-result-name{font-size:14px;color:#1a1a18;}
.search-result-hint{font-size:11px;color:#888780;margin-top:2px;}
.added-badge{display:inline-block;font-size:10px;background:#E1F5EE;color:#085041;padding:1px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.summary-box{background:#fff;border-radius:10px;border:0.5px solid #d3d1c7;padding:14px;}
.summary-line{font-size:13px;color:#1a1a18;padding:3px 0;}
.note-field{width:100%;padding:10px 14px;border:0.5px solid #d3d1c7;border-radius:10px;font-size:14px;background:#fff;color:#1a1a18;resize:none;outline:none;margin-top:6px;}
.note-field:focus{border-color:#1D9E75;}
.submit-btn{width:100%;padding:15px;background:#1D9E75;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:18px;-webkit-tap-highlight-color:transparent;}
.submit-btn:disabled{opacity:0.35;cursor:default;}
.submit-btn:active:not(:disabled){transform:scale(0.98);}
.divider{border:none;border-top:0.5px solid #d3d1c7;margin:18px 0;}
.success{text-align:center;padding:40px 24px;}
.check-circle{width:60px;height:60px;background:#E1F5EE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.success-title{font-size:19px;font-weight:600;color:#1a1a18;}
.success-sub{font-size:13px;color:#888780;margin-top:8px;line-height:1.6;}
.success-ref{font-size:12px;color:#888780;margin-top:10px;font-family:monospace;background:#f5f4f0;padding:6px 14px;border-radius:8px;display:inline-block;}
.new-btn{margin-top:24px;padding:12px 28px;border-radius:10px;border:0.5px solid #d3d1c7;background:#fff;font-size:14px;cursor:pointer;color:#1a1a18;}
</style>
</head>
<body>
<div class="header">
  <div class="header-sub">CAFÉ 77 — KITCHEN REQUEST</div>
  <div class="header-title">{{ outlet.name }}</div>
  <div class="header-outlet">Any staff can submit · No login required</div>
</div>

<div class="body" id="form-body">

  <div class="section-label">YOUR REGULAR ITEMS</div>
  <div id="regular-items"></div>

  <hr class="divider">

  <div class="section-label">SEARCH OTHER KITCHEN ITEMS</div>
  <input class="search-input" id="search-box" type="text" placeholder="Type to search e.g. soup, bread…" autocomplete="off" oninput="doSearch(this.value)">
  <div id="search-results" style="margin-top:8px;"></div>
  <div id="added-extras"></div>

  <div id="summary-section" style="display:none;">
    <hr class="divider">
    <div class="section-label">REQUEST SUMMARY</div>
    <div class="summary-box" id="summary-lines"></div>
  </div>

  <hr class="divider">
  <div class="section-label">NOTE FOR KITCHEN (OPTIONAL)</div>
  <textarea class="note-field" id="note" rows="2" placeholder="e.g. urgent, extra portions needed…"></textarea>

  <button class="submit-btn" id="submit-btn" disabled onclick="submitRequest()">Submit request</button>
</div>

<div class="body" id="success-body" style="display:none;">
  <div class="success">
    <div class="check-circle">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <path d="M6 15l7 7L24 8" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="success-title">Request submitted</div>
    <div class="success-sub">Kitchen has been notified.<br>Internal transfer created successfully.</div>
    <div class="success-ref" id="ref-display"></div>
    <br>
    <button class="new-btn" onclick="resetForm()">Submit another request</button>
  </div>
</div>

<script>
const TOKEN   = "{{ outlet.token }}";
const REGULAR = {{ products | tojson }};
const qtys    = {};
const extras  = {};

function renderRegular(){
  const c = document.getElementById('regular-items');
  c.innerHTML = '';
  REGULAR.forEach(item => {
    const q = qtys[item.id] || 0;
    const d = document.createElement('div');
    d.className = 'item-row';
    d.innerHTML = `
      <div>
        <div class="item-name">${item.name}</div>
        <div class="item-unit">${item.unit}</div>
      </div>
      <div class="stepper">
        <button class="step-btn" ontouchend="adj('${item.id}',-1,event)" onclick="adj('${item.id}',-1,event)">−</button>
        <span class="qty-val ${q>0?'has':''}">${q}</span>
        <button class="step-btn ${q>0?'active':''}" ontouchend="adj('${item.id}',1,event)" onclick="adj('${item.id}',1,event)">+</button>
      </div>`;
    c.appendChild(d);
  });
}

function renderExtras(){
  const c = document.getElementById('added-extras');
  c.innerHTML = '';
  Object.values(extras).filter(i=>(qtys[i.id]||0)>0).forEach(item => {
    const q = qtys[item.id];
    const d = document.createElement('div');
    d.className = 'item-row';
    d.innerHTML = `
      <div>
        <div class="item-name">${item.name}<span class="added-badge">added</span></div>
        <div class="item-unit">${item.unit}</div>
      </div>
      <div class="stepper">
        <button class="step-btn" ontouchend="adjExtra('${item.id}',-1,event)" onclick="adjExtra('${item.id}',-1,event)">−</button>
        <span class="qty-val has">${q}</span>
        <button class="step-btn active" ontouchend="adjExtra('${item.id}',1,event)" onclick="adjExtra('${item.id}',1,event)">+</button>
      </div>`;
    c.appendChild(d);
  });
}

function adj(id, delta, e){
  if(e) e.preventDefault();
  qtys[id] = Math.max(0, (qtys[id]||0) + delta);
  renderRegular();
  updateSummary();
}

function adjExtra(id, delta, e){
  if(e) e.preventDefault();
  qtys[id] = Math.max(0, (qtys[id]||0) + delta);
  if(qtys[id]===0) delete extras[id];
  renderExtras();
  updateSummary();
}

async function doSearch(val){
  const c = document.getElementById('search-results');
  if(!val.trim()){ c.innerHTML=''; return; }
  const res = await fetch(`/search?q=${encodeURIComponent(val)}&token=${TOKEN}`);
  const items = await res.json();
  c.innerHTML = '';
  if(!items.length){
    c.innerHTML='<div style="font-size:12px;color:#888780;padding:6px 4px;">No items found</div>';
    return;
  }
  const regularIds = new Set(REGULAR.map(i=>i.id));
  items.filter(i=>!regularIds.has(i.id)).forEach(item => {
    const isAdded = !!extras[item.id];
    const d = document.createElement('div');
    d.className = 'search-result';
    d.innerHTML = `
      <div class="search-result-name">${item.name}${isAdded?'<span class="added-badge">added</span>':''}</div>
      <div class="search-result-hint">${item.unit} · tap to add</div>`;
    d.onclick = () => addExtra(item);
    c.appendChild(d);
  });
}

function addExtra(item){
  extras[item.id] = item;
  qtys[item.id]   = (qtys[item.id]||0) + 1;
  document.getElementById('search-box').value = '';
  document.getElementById('search-results').innerHTML = '';
  renderExtras();
  updateSummary();
}

function updateSummary(){
  const allItems = [...REGULAR, ...Object.values(extras)];
  const lines    = allItems.filter(i=>(qtys[i.id]||0)>0);
  const sec      = document.getElementById('summary-section');
  const linesDiv = document.getElementById('summary-lines');
  const btn      = document.getElementById('submit-btn');
  if(lines.length){
    sec.style.display = 'block';
    linesDiv.innerHTML = lines.map(i=>`<div class="summary-line">${qtys[i.id]} × ${i.name}</div>`).join('');
    btn.disabled = false;
  } else {
    sec.style.display = 'none';
    btn.disabled = true;
  }
}

async function submitRequest(){
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  const allItems = [...REGULAR, ...Object.values(extras)];
  const items = allItems.filter(i=>(qtys[i.id]||0)>0).map(i=>({id:i.id,name:i.name,unit:i.unit,qty:qtys[i.id]}));
  const note  = document.getElementById('note').value.trim();
  try {
    const res  = await fetch('/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN,items,note})});
    const data = await res.json();
    if(data.ok){
      document.getElementById('ref-display').textContent = 'Ref: ' + data.ref;
      document.getElementById('form-body').style.display    = 'none';
      document.getElementById('success-body').style.display = 'block';
    } else {
      alert('Error: ' + data.error);
      btn.disabled = false;
      btn.textContent = 'Submit request';
    }
  } catch(err){
    alert('Could not reach server. Check WiFi.');
    btn.disabled = false;
    btn.textContent = 'Submit request';
  }
}

function resetForm(){
  Object.keys(qtys).forEach(k=>delete qtys[k]);
  Object.keys(extras).forEach(k=>delete extras[k]);
  document.getElementById('note').value = '';
  document.getElementById('success-body').style.display = 'none';
  document.getElementById('form-body').style.display    = 'block';
  renderRegular();
  renderExtras();
  updateSummary();
}

renderRegular();
</script>
</body>
</html>
